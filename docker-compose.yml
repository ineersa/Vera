# Vera CLI container (no MCP default command)
#
# Build image:
#   docker compose build
#
# Show CLI help (default command):
#   docker compose run --rm vera
#
# Run one-off Vera commands:
#   docker compose run --rm vera index /workspace
#   docker compose run --rm vera search "authentication logic"
#   docker compose run --rm vera overview
#
# Equivalent plain docker commands:
#   docker build -t vera:local .
#   docker run --rm \
#     --add-host=host.docker.internal:host-gateway \
#     -v $(pwd):/workspace \
#     -v ./docker-data/vera-home:/root/.vera \
#     vera:local --help
#
# Optional setup (persists under ./docker-data/vera-home):
#   docker compose run --rm vera setup
#   docker compose run --rm vera backend --api

services:
  vera:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--help"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/workspace
      - ./docker-data/vera-home:/root/.vera
