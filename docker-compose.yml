# Vera MCP server (API mode)
#
# Build & run:
#   docker compose build
#   docker compose run --rm vera mcp
#
# One-off CLI commands:
#   docker compose run --rm vera index /workspace
#   docker compose run --rm vera search "authentication logic"
#   docker compose run --rm vera overview
#
# Equivalent plain docker commands:
#   docker build -t vera:local .
#   docker run --rm -i \
#     --add-host=host.docker.internal:host-gateway \
#     -v $(pwd):/workspace \
#     -v vera-config:/root/.vera \
#     -e EMBEDDING_MODEL_BASE_URL=http://host.docker.internal:8059/v1 \
#     -e EMBEDDING_MODEL_API_KEY=not-needed \
#     -e EMBEDDING_MODEL_ID=coderankembed-q8_0.gguf \
#     -e 'EMBEDDING_MODEL_QUERY_PREFIX=Represent this query for searching relevant code:' \
#     -e RERANKER_MODEL_BASE_URL=http://host.docker.internal:8060/v1 \
#     -e RERANKER_MODEL_API_KEY=not-needed \
#     -e RERANKER_MODEL_ID=bge-reranker-base-q8_0.gguf \
#     -e RERANKER_MAX_DOCS_PER_REQUEST=8 \
#     -e RERANKER_MAX_DOCUMENT_CHARS=1200 \
#     -e VERA_COMPLETION_BASE_URL=http://host.docker.internal:8052/v1 \
#     -e VERA_COMPLETION_MODEL_ID=flash \
#     -e VERA_COMPLETION_API_KEY=not-needed \
#     vera:local
#
# MCP client config (Claude Desktop, Cursor, etc.):
#   {
#     "mcpServers": {
#       "vera": {
#         "command": "docker",
#         "args": ["compose", "-f", "/absolute/path/to/docker-compose.yml", "run", "--rm", "vera"]
#       }
#     }
#   }

services:
  vera:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - EMBEDDING_MODEL_BASE_URL=http://host.docker.internal:8059/v1
      - EMBEDDING_MODEL_API_KEY=not-needed
      - EMBEDDING_MODEL_ID=coderankembed-q8_0.gguf
      - "EMBEDDING_MODEL_QUERY_PREFIX=Represent this query for searching relevant code:"
      - RERANKER_MODEL_BASE_URL=http://host.docker.internal:8060/v1
      - RERANKER_MODEL_API_KEY=not-needed
      - RERANKER_MODEL_ID=bge-reranker-base-q8_0.gguf
      - RERANKER_MAX_DOCS_PER_REQUEST=8
      - RERANKER_MAX_DOCUMENT_CHARS=1200
      - VERA_COMPLETION_BASE_URL=http://host.docker.internal:8052/v1
      - VERA_COMPLETION_MODEL_ID=flash
      - VERA_COMPLETION_API_KEY=not-needed
    volumes:
      - .:/workspace
      - vera-config:/root/.vera

volumes:
  vera-config:
