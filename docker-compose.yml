# Vera CLI-only container (MCP explicitly disabled)
#
# Build image:
#   docker compose build
#
# Show CLI help (default command):
#   docker compose run --rm vera
#
# On macOS, if `docker compose run` hangs after command output, disable TTY:
#   docker compose run --rm -T vera --version
#
# MCP is blocked in this service:
#   docker compose run --rm vera mcp   # exits with an error
#
# Run one-off Vera commands:
#   docker compose run --rm vera index /workspace
#   docker compose run --rm vera search "authentication logic"
#   docker compose run --rm vera overview
#
# Equivalent plain docker commands:
#   docker build -t vera:local .
#   docker run --rm \
#     --add-host=host.docker.internal:host-gateway \
#     -v $(pwd):/workspace \
#     -v ./docker-data/vera-home:/root/.vera \
#     vera:local --help
#
# Optional setup (persists under ./docker-data/vera-home):
#   docker compose run --rm vera setup
#   docker compose run --rm vera backend --api

services:
  vera:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      [
        "/bin/sh",
        "-ec",
        "if [ \"$${1:-}\" = \"mcp\" ]; then echo \"Error: MCP is disabled in this docker-compose service. Use Vera CLI commands only.\" >&2; exit 64; fi; exec vera \"$$@\"",
        "--",
      ]
    command: ["help"]
    stdin_open: false
    tty: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/workspace
      - ./docker-data/vera-home:/root/.vera
